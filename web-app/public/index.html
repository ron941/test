<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Productivity Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Productivity Planner</h1>
      <p>用清晰的每日任務與追蹤，打造專注、有節奏的工作日常。</p>
    </header>

    <main class="layout">
      <section class="panel" aria-labelledby="task-creator">
        <h2 id="task-creator">新增任務</h2>
        <form id="task-form" class="task-form" novalidate>
          <label class="field">
            <span>任務標題</span>
            <input type="text" id="task-title" name="title" required placeholder="例如：撰寫專案進度報告" />
          </label>
          <label class="field">
            <span>任務描述</span>
            <textarea id="task-description" name="description" rows="3" placeholder="補充細節、相關連結或檔案位置"></textarea>
          </label>
          <button type="submit" class="primary">加入任務</button>
          <p class="form-feedback" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel" aria-labelledby="task-list">
        <div class="panel-header">
          <h2 id="task-list">今日任務</h2>
          <button id="refresh-btn" class="secondary" type="button">重新整理</button>
        </div>
        <ul id="tasks" class="task-list" aria-live="polite"></ul>
      </section>

      <section class="panel" aria-labelledby="insight">
        <h2 id="insight">專注洞察</h2>
        <div class="insights">
          <p><strong>完成率：</strong><span id="completion-rate">0%</span></p>
          <p><strong>進度摘要：</strong></p>
          <ul id="summary"></ul>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>提示：長按任務可快速刪除，點擊可切換完成狀態。</p>
    </footer>

    <template id="task-template">
      <li class="task-item">
        <div class="task-content">
          <div class="task-header">
            <input type="checkbox" />
            <h3></h3>
          </div>
          <p class="task-description"></p>
        </div>
        <button class="delete-btn" type="button" aria-label="刪除任務">刪除</button>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
